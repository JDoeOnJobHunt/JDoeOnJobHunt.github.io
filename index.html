<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBEE – Energie & Finanzierung</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0B1220",
        accent: "#2563EB",
        muted: "#64748B",
        soft: "#F8FAFC"
      }
    }
  }
}
</script>

<script src="/i18n.js"></script>

<style>
body { font-family: 'Inter', sans-serif; }

/* smoother animations */
* { transition: all 0.25s ease; }

/* Flip Cards */
.flip-card { perspective: 1000px; }
.flip-inner {
  transform-style: preserve-3d;
}
.flip-card:hover .flip-inner {
  transform: rotateY(180deg);
}
.flip-front, .flip-back {
  backface-visibility: hidden;
}
.flip-back {
  transform: rotateY(180deg);
}
</style>
</head>

<body class="bg-white text-primary">

<!-- NAV -->
<header class="fixed w-full bg-white/80 backdrop-blur z-50 border-b border-gray-100">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-5">
    <h1 class="font-semibold tracking-wide">HBEE</h1>
    <nav class="space-x-8 text-sm text-muted">
      <a href="#about" class="hover:text-accent" data-i18n="nav.about">Über uns</a>
      <a href="#services" class="hover:text-accent" data-i18n="nav.services">Leistungen</a>
      <a href="#contact" class="bg-accent text-white px-4 py-2 rounded-full" data-i18n="nav.contact">Kontakt</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="h-screen flex items-center justify-center bg-[url('./bilder/Bild3.png')] bg-cover bg-center relative">
  
  <div class="absolute inset-0 bg-gradient-to-b from-black/60 to-black/70"></div>

  <div class="relative text-center text-white max-w-3xl px-6">
    <h2 class="text-5xl md:text-6xl font-light leading-tight mb-6" data-i18n="hero.title" data-i18n-html></h2>
    <p class="text-gray-300 mb-8 text-lg" data-i18n="hero.subtitle"></p>
    <a href="#contact" class="bg-accent hover:bg-blue-700 px-8 py-4 rounded-full text-lg" data-i18n="hero.cta"></a>
  </div>

</section>

<!-- TRUST BAR -->
<section class="py-12 bg-soft text-center text-sm text-muted">
  <p data-i18n="trust.text" data-i18n-html></p>
</section>

<!-- ABOUT -->
<section id="about" class="py-24 px-6 max-w-6xl mx-auto">
  
  <div class="grid md:grid-cols-2 gap-16 items-center mb-20">
    <div>
      <h3 class="text-3xl font-light mb-6" data-i18n="about.title"></h3>
      <p class="text-muted mb-4" data-i18n="about.intro"></p>
      <p class="text-muted">
        <span data-i18n="about.focus"></span>
        <ul class="text-muted space-y-4">
          <li data-i18n="about.point1"></li>
          <li data-i18n="about.point2"></li>
          <li data-i18n="about.point3"></li>
        </ul>
      </p>
    </div>
    <div class="h-80 rounded-2xl bg-cover bg-center shadow"
         style="background-image:url('./bilder/Bild1.png')"></div>
  </div>

  <!-- CARDS -->
  <div class="grid md:grid-cols-3 gap-8">

    <div class="flip-card h-64">
      <div class="flip-inner relative w-full h-full">
        <div class="flip-front absolute w-full h-full rounded-2xl bg-cover bg-center shadow"
             style="background-image:url('./bilder/Bild2.png')"></div>
        <div class="flip-back absolute w-full h-full bg-primary text-white flex items-center justify-center rounded-2xl p-6" data-i18n="card1.front"></div>
      </div>
    </div>

    <div class="flip-card h-64">
      <div class="flip-inner relative w-full h-full">
        <div class="flip-front absolute w-full h-full rounded-2xl bg-cover bg-center shadow"
             style="background-image:url('https://images.unsplash.com/photo-1628595351029-c2bf17511435')"></div>
        <div class="flip-back absolute w-full h-full bg-primary text-white flex items-center justify-center rounded-2xl p-6" data-i18n="card2.front"></div>
      </div>
    </div>

    <div class="flip-card h-64">
      <div class="flip-inner relative w-full h-full">
        <div class="flip-front absolute w-full h-full rounded-2xl bg-cover bg-center shadow"
             style="background-image:url('https://images.unsplash.com/photo-1551836022-d5d88e9218df')"></div>
        <div class="flip-back absolute w-full h-full bg-primary text-white flex items-center justify-center rounded-2xl p-6" data-i18n="card3.front"></div>
      </div>
    </div>

  </div>

</section>

<!-- SERVICES -->
<section id="services" class="py-24 bg-soft px-6">
  <div class="max-w-6xl mx-auto text-center mb-16">
    <h3 class="text-3xl font-light mb-4" data-i18n="services.title"></h3>
    <p class="text-muted" data-i18n="services.intro"></p>
    <p class="text-muted" data-i18n="services.description" data-i18n-html></p>
  </p>
  </div>

  <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-10">

    <div class="bg-white p-10 rounded-2xl shadow hover:shadow-lg">
      <h4 class="font-semibold mb-4" data-i18n="service1.title"></h4>
      <p class="text-muted" data-i18n="service1.desc"></p>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow hover:shadow-lg">
      <h4 class="font-semibold mb-4" data-i18n="service2.title"></h4>
      <p class="text-muted"><span data-i18n="service2.desc"></span>
        <ul class="text-muted space-y-4">
          <li data-i18n="service2.point1"></li>
          <li data-i18n="service2.point2"></li>
          <li data-i18n="service2.point3"></li>
        </ul>
      </p>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow hover:shadow-lg">
      <h4 class="font-semibold mb-4" data-i18n="service3.title"></h4>
      <p class="text-muted" data-i18n="service3.desc"></p>
    </div>
</section>

<!-- CTA -->
<section class="py-24 bg-primary text-white text-center">
  <h3 class="text-3xl font-light mb-6 max-w-xl mx-auto" data-i18n="cta.title"></h3>
  <a href="#contact" class="bg-accent px-8 py-4 rounded-full text-lg inline-block" data-i18n="cta.button"></a>
</section>

<!-- CONTACT -->
<section id="contact" class="py-24 px-6 text-center">
  <h3 class="text-3xl font-light mb-8" data-i18n="contact.title"></h3>

  <form class="max-w-xl mx-auto grid gap-5">
    <input type="text" data-i18n-placeholder="contact.name" placeholder="Name" class="p-4 border rounded-xl focus:ring-2 focus:ring-accent outline-none">
    <input type="email" data-i18n-placeholder="contact.email" placeholder="E-Mail" class="p-4 border rounded-xl focus:ring-2 focus:ring-accent outline-none">
    <textarea data-i18n-placeholder="contact.message" placeholder="Nachricht" class="p-4 border rounded-xl h-32 focus:ring-2 focus:ring-accent outline-none"></textarea>
    <button class="bg-accent text-white py-4 rounded-full text-lg" data-i18n="contact.submit"></button>
  </form>
</section>
  
<!-- FOOTER -->
<footer class="py-12 text-center text-sm text-muted border-t">
  <p class="mb-4"><span data-i18n="footer.company"></span>
    <br><span data-i18n="footer.address" data-i18n-html></span></p>
  <a href="/impressum" class="hover:text-accent" data-i18n="footer.imprint"></a> ·
  <a href="/datenschutz" class="hover:text-accent" data-i18n="footer.privacy"></a> ·
  <a href="/disclaimer" class="hover:text-accent" data-i18n="footer.disclaimer"></a> ·
</footer>

</body>
</html>
